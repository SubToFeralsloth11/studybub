name: Quality and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.1"

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run format:check
      - run: bun run lint:duplication

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.1"

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile
      - run: bun run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.1"

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: build-output
          path: .output/
          retention-days: 1

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.1"

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile
      - run: bunx playwright install chromium --with-deps

      # Diagnostic: boot the dev server under bun with verbose logging and a
      # hard timeout, then probe the port. The log is uploaded regardless of
      # the E2E result so a hang in Vite/plugin startup is attributable.
      - name: Diagnose dev server startup
        run: |
          set +e
          mkdir -p ./dev-diag
          VITE_BYPASS_AUTH=true bun --bun vite dev --debug \
            > ./dev-diag/dev.log 2>&1 &
          DEV_PID=$!
          echo "dev server pid: $DEV_PID"
          # Poll the port for up to 90s, but stop sooner if the process exits.
          for i in $(seq 1 90); do
            if ! kill -0 "$DEV_PID" 2>/dev/null; then
              echo "dev server exited early after ${i}s"
              break
            fi
            if curl -sS -m 2 -o /dev/null http://127.0.0.1:3000/; then
              echo "dev server responded after ${i}s"
              break
            fi
            sleep 1
          done
          echo "=== dev.log ==="
          cat ./dev-diag/dev.log
          kill "$DEV_PID" 2>/dev/null || true
          wait "$DEV_PID" 2>/dev/null || true

      - run: bun run test:e2e

      - name: Upload dev server diagnostic log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: dev-diag
          path: dev-diag/
          retention-days: 7

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Deploy to VPS
    needs: [static-analysis, unit-tests, build, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      # Deploy the exact build artifact produced and gated by the build job,
      # rather than rebuilding a fresh (ungated) bundle on the runner.
      - uses: actions/checkout@v5

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: build-output
          path: .output/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Rsync build to VPS
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='node_modules/' \
            --exclude='.git/' \
            --exclude='src/' \
            --exclude='*.db' \
            --exclude='*.db-wal' \
            --exclude='*.db-shm' \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key" \
            .output scripts package.json bun.lock \
            "${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.VPS_PATH }}/"

      - name: Install production dependencies on VPS
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key \
            "${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}" \
            "cd ${{ vars.VPS_PATH }} && bun install --production"

      - name: Restart service on VPS
        if: success()
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key \
            "${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}" \
            sudo systemctl restart studybub.service

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
