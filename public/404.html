<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>StudyBub</title>
    <script>
      // GitHub Pages SPA redirect hack.
      // When GitHub Pages can't find a file at the requested path, it serves this
      // 404.html instead. We store the intended path in sessionStorage and then
      // redirect to the app root where index.html will restore the route.
      (function () {
        var base = "/";
        // The path relative to the base (e.g. "subject/languages/track/german-wir-reisen").
        var fullPath = location.pathname + location.search + location.hash;
        var relPath;
        if (fullPath.indexOf(base) === 0) {
          relPath = fullPath.slice(base.length);
        } else {
          relPath = fullPath.replace(/^\//, "");
        }
        sessionStorage.setItem("spaRedirect", relPath);
        location.replace(base);
      })();
    </script>
  </head>
  <body></body>
</html>
